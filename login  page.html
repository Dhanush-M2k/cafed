        <div class="box">
    <div class="container">
        <div class="top-header">
            <span>Have an account?</span>
            <header>Login</header>
        </div>
        <div class="input-field">
            <input type="text" class="input" id="i1" placeholder="username" required>
        </div><br>
        <div class="input-field">
            <input type="text" class="input" id="i2" placeholder="mobile" required>
        </div><br>
        <div class="input-field">
            <input type="text" class="input" id="i3" placeholder="email" required>
        </div><br>
        <div class="input-field">
            <input type="text" class="input" id="i4" placeholder="password" required>
        </div><br>
        <button class="btn" onclick="validate()">submit</button>
        <div class="bottom">
            <div class="left">
                <input type="checkbox" id="check">
                <label for="check">Remember me</label>
            </div>
            <div class="right">
                <a href="#">forgot password?</a></label>
            </div>
        </div>
    </div>
</div>    

<script>
    function validate(){
var n1=document.getElementById("i1").value;        
var n2=document.getElementById("i2").value;
var n3=document.getElementById("i3").value;
var n4=document.getElementById("i4").value;
alpha=/^[A-Za-z]+$/
number=/^([0-9]{5,})+$/
email=/^[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+$/
pass=/^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*]).+$/
if(n1==""){alert("enter the name");}
else if(!alpha.test(n1)){alert("use only alphabets");}
if(n2==""){alert("enter the mobile");}
else if(!number.test(n2)){alert("enter 5 digit number");}
if(n3==""){alert("enter the email");}
else if(!email.test(n3)){alert("use only correct email");}
if(n4==""){alert("enter the password");}
if(!pass.test(n4)){alert("create strong password");}
else{alert("success");}
}

</script>
